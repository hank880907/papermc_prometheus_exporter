name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: temurin

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Run tests
        run: ./gradlew test

      - name: Build JAR
        run: ./gradlew shadowJar -PpluginVersion=${{ env.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/PrometheusExporter-${{ env.VERSION }}.jar
          generate_release_notes: true
          body_path: RELEASE_NOTES.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: REPLACE_WITH_MODRINTH_PROJECT_ID
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          loaders: paper
          game-versions: 26.1.x
          name: PrometheusExporter ${{ env.VERSION }}
          changelog-file: RELEASE_NOTES.md

      - name: Sync Modrinth description from README
        run: |
          curl -sf -X PATCH "https://api.modrinth.com/v2/project/REPLACE_WITH_MODRINTH_PROJECT_ID" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --rawfile body README.md '{"body": $body}')"
